<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gitHub issues tracker home</title>

        <!-- Daisy UI and Tailwind CSS -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />

        <!-- Google Font Giest -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <style>
            * {
                font-family: "Geist", sans-serif;
            }
            .active {
                background-color: #4a00ff;
                color: white;
            }
        </style>
    </head>

    <body class="bg-[#F8FAFC] min-h-screen">
        <nav class="bg-white">
            <div
                class="nav-content max-w-7xl mx-auto py-6 flex justify-between items-center"
            >
                <a href="">
                    <div class="flex justify-start items-center gap-1">
                        <img
                            class="w-9 h-9"
                            src="assets/github-logo.png"
                            alt=""
                        />
                        <h1 class="text-[#1F2937] font-semibold text-2xl">
                            GitHub Issues Tracker
                        </h1>
                    </div>
                </a>

                <div class="flex gap-4">
                    <div class="relative group">
                        <input
                            onclick="handleSearch()"
                            id="search-issues"
                            class="p-3 border-2 border-gray-300 focus:border-purple-600 rounded-md pr-24 focus:placeholder:text-white"
                            type="text"
                            placeholder="      Search issues..."
                        />
                        <span class="absolute left-3 top-[18px]"
                            ><svg
                                id="search-icon"
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="size-5 text-gray-500 group-focus-within:hidden"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
                                />
                            </svg>
                        </span>
                    </div>

                    <button
                        class="flex items-center gap-1 px-4 py-2 text-white font-semibold rounded-md bg-[#4A00FF] hover:scale-105 transition shadow-md cursor-pointer"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2.5"
                            stroke="currentColor"
                            class="w-4 h-4"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M12 4.5v15m7.5-7.5h-15"
                            />
                        </svg>

                        New Issue
                    </button>
                </div>
            </div>
        </nav>

        <!-- Tab Section -->
        <section
            class="max-w-6xl mx-auto p-6 bg-white rounded-md shadow-lg mt-14"
        >
            <ul class="flex justify-start gap-2">
                <li
                    onclick="handleTab(event)"
                    class="tab active text-[#64748B] font-semibold py-2 px-10 border-2 border-[#747e8e5e] rounded-md hover:shadow-lg hover:shadow-gray-500 hover:bg-[#4A00FF] hover:text-white"
                >
                    All
                </li>

                <li
                    onclick="handleTab(event)"
                    class="tab text-[#64748B] font-semibold py-2 px-10 border-2 border-[#747e8e5e] rounded-md hover:shadow-lg hover:shadow-gray-500 hover:bg-[#4A00FF] hover:text-white"
                >
                    Open
                </li>

                <li
                    onclick="handleTab(event)"
                    class="tab text-[#64748B] font-semibold py-2 px-10 border-2 border-[#747e8e5e] rounded-md hover:shadow-lg hover:shadow-gray-500 hover:bg-[#4A00FF] hover:text-white"
                >
                    Closed
                </li>
            </ul>
        </section>

        <!-- Card Display Section -->

        <section class="max-w-6xl mx-auto bg-white rounded-md shadow-lg mt-4">
            <div class="card-container-header p-6 flex justify-between items-center">
                <div class="flex items-center gap-2">
                  <div class="flex items-center justify-center w-10 h-10 bg-[#ECE4FF] rounded-full">
                    <img src="assets/Aperture.png" alt="">
                  </div>
                  <div>
                    <h1 class="font-semibold text-xl text-[#1F2937]">50 Issues</h1>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                  </div>
                </div>

                <div>
                  <h1 class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-green-600"></div>Open<div class="w-3 h-3 ml-2 rounded-full bg-purple-500"></div> Closed</h1>
                </div>
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-32 bg-[#FBFBFB] border-t-2 border-gray-200"></div>
        </section>

        <script src="scripts/signin.js"></script>
        <script src="scripts/search.js"></script>
        <script src="scripts/script.js"></script>
    </body>
</html>
